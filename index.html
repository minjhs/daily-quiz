<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>The Daily Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light only;
  --ink: #1c1917;
  --paper: #f7f3ec;
  --card: #fffefb;
  --accent: #b5341f;
  --accent2: #1d4ed8;
  --gold: #c8962a;
  --muted: #78716c;
  --muted2: #a8a29e;
  --green: #166534;
  --green-bg: #f0fdf4;
  --red-bg: #fef2f2;
  --border: #e2ddd5;
  --border2: #cdc8be;
  --shadow: 3px 3px 0 #d6d0c4;
  --shadow-sm: 2px 2px 0 #d6d0c4;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  background: var(--paper) !important;
  color: var(--ink) !important;
  font-family: 'Source Serif 4', Georgia, serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  border-bottom: 2.5px solid var(--ink);
  background: var(--card);
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 860px;
  margin: 0 auto;
  padding: .9rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.masthead {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  font-weight: 900;
  letter-spacing: -.02em;
  line-height: 1;
}
.masthead span { color: var(--accent); }
.edition {
  font-size: .68rem;
  color: var(--muted);
  letter-spacing: .14em;
  text-transform: uppercase;
  border-left: 1px solid var(--border2);
  padding-left: .9rem;
  line-height: 1.4;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: .6rem;
  font-size: .8rem;
}
.h-nick {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  color: var(--ink);
  display: none;
}
.h-plays {
  color: var(--muted);
  display: none;
  font-size: .75rem;
}
.h-score-label { color: var(--muted); font-size: .75rem; }
.h-score {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  font-weight: 900;
  color: var(--accent);
  min-width: 2ch;
  text-align: right;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── LAYOUT WRAPPER ── */
.page-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}
.center-wrap {
  max-width: 480px;
  margin: 2.5rem auto;
  padding: 0 1.5rem;
}

/* ── CARD ── */
.card {
  background: var(--card) !important;
  color: var(--ink) !important;
  border: 1.5px solid var(--border);
  border-radius: 2px;
  padding: 2.2rem 2rem;
  box-shadow: var(--shadow);
}
.card-eyebrow {
  font-size: .65rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  margin-bottom: .6rem;
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: .5rem;
}
.card-sub {
  font-size: .9rem;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 1.8rem;
}
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}

/* ── FORM ── */
label {
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  display: block;
  margin-bottom: .4rem;
}
input[type=text] {
  width: 100%;
  padding: .8rem 1rem;
  border: 1.5px solid var(--border2);
  border-radius: 2px;
  font-family: 'Source Serif 4', serif;
  font-size: .95rem;
  background: white !important;
  color: var(--ink) !important;
  -webkit-text-fill-color: var(--ink) !important;
  transition: border-color .15s;
  margin-bottom: 1rem;
  appearance: none;
}
input[type=text]:focus {
  outline: none;
  border-color: var(--ink);
}
input[type=text]::placeholder { color: var(--muted2); }

/* ── BUTTONS ── */
.btn {
  display: block;
  width: 100%;
  padding: .9rem 1.2rem;
  border: 2px solid transparent;
  border-radius: 2px;
  font-family: 'DM Mono', monospace;
  font-size: .82rem;
  font-weight: 500;
  letter-spacing: .06em;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  margin-bottom: .6rem;
  text-transform: uppercase;
}
.btn-primary {
  background: var(--ink) !important;
  color: white !important;
  border-color: var(--ink);
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent) !important;
  border-color: var(--accent);
}
.btn-primary:disabled {
  opacity: .4;
  cursor: not-allowed;
}
.btn-outline {
  background: transparent !important;
  color: var(--ink) !important;
  border-color: var(--ink);
}
.btn-outline:hover {
  background: var(--ink) !important;
  color: white !important;
}
.btn-gold {
  background: transparent !important;
  color: var(--gold) !important;
  border-color: var(--gold);
}
.btn-gold:hover {
  background: var(--gold) !important;
  color: white !important;
}
.note {
  font-size: .78rem;
  color: var(--muted);
  margin-top: .8rem;
  line-height: 1.6;
  text-align: center;
}
.plays-msg {
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  color: var(--muted);
  margin-bottom: .8rem;
  display: none;
  padding: .5rem .8rem;
  background: var(--paper);
  border-left: 3px solid var(--border2);
}
.plays-msg.warn { color: var(--accent); border-left-color: var(--accent); }

/* ── LOADING ── */
.loading-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: .8rem;
  letter-spacing: .1em;
}
.loading-dots::after {
  content: '...';
  animation: dots 1.2s steps(3,end) infinite;
}
@keyframes dots {
  0%,100% { content: '.'; }
  33% { content: '..'; }
  66% { content: '...'; }
}

/* ── QUIZ SCREEN ── */
.progress-wrap { margin-bottom: 1.8rem; }
.progress-strip {
  display: flex;
  gap: 5px;
  margin-bottom: .5rem;
}
.pdot {
  height: 3px;
  flex: 1;
  background: var(--border);
  border-radius: 10px;
  transition: background .3s;
}
.pdot.done { background: var(--green); }
.pdot.cur  { background: var(--accent); }
.q-counter {
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  color: var(--muted);
  letter-spacing: .08em;
}

.news-card {
  background: var(--card) !important;
  border: 1.5px solid var(--border);
  border-radius: 2px;
  padding: 1.6rem 1.8rem;
  margin-bottom: 1.3rem;
  box-shadow: var(--shadow);
  position: relative;
}
.news-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: var(--accent);
  border-radius: 2px 0 0 2px;
}
.src-tag {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .5rem;
  display: flex;
  align-items: center;
  gap: .4rem;
}
.src-dot {
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
}
.news-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.35;
  margin-bottom: .6rem;
  color: var(--ink);
}
.news-summary {
  font-size: .88rem;
  line-height: 1.8;
  color: #3a3530;
}
.hl {
  background: #fef3c7 !important;
  padding: 0 3px;
  border-radius: 2px;
  font-weight: 600;
  color: #92400e !important;
  border-bottom: 2px dashed #d97706;
  cursor: help;
  font-style: italic;
}

.q-section { margin-top: 1.2rem; }
.q-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .6rem;
}
.q-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.45;
  margin-bottom: 1.1rem;
  color: var(--ink);
}

/* ── OPTIONS ── */
.opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .55rem;
  margin-bottom: 1rem;
}
.opt {
  background: white !important;
  color: var(--ink) !important;
  border: 1.5px solid var(--border2);
  border-radius: 2px;
  padding: .8rem 1rem;
  font-family: 'Source Serif 4', serif;
  font-size: .86rem;
  cursor: pointer;
  text-align: left;
  transition: all .12s;
  line-height: 1.4;
  position: relative;
}
.opt-letter {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  font-weight: 500;
  color: var(--muted);
  display: block;
  margin-bottom: .2rem;
  letter-spacing: .06em;
}
.opt:hover:not(:disabled) {
  border-color: var(--ink);
  background: var(--paper) !important;
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.opt.correct {
  background: var(--green-bg) !important;
  border-color: var(--green);
  color: var(--green) !important;
}
.opt.correct .opt-letter { color: var(--green); }
.opt.wrong {
  background: var(--red-bg) !important;
  border-color: #ef4444;
  color: #b91c1c !important;
}
.opt.wrong .opt-letter { color: #b91c1c; }
.opt:disabled { cursor: default; }

/* ── FEEDBACK ── */
.fb {
  padding: .9rem 1.1rem;
  border-radius: 2px;
  font-size: .86rem;
  line-height: 1.65;
  display: none;
  margin-bottom: .8rem;
}
.fb.show-correct {
  display: block;
  background: var(--green-bg) !important;
  color: #065f46 !important;
  border-left: 3px solid var(--green);
}
.fb.show-wrong {
  display: block;
  background: var(--red-bg) !important;
  color: #991b1b !important;
  border-left: 3px solid #ef4444;
}
.fb-word {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
}

.zh-box {
  padding: .9rem 1.1rem;
  background: #fffbf0 !important;
  color: #5a4a20 !important;
  border-left: 3px solid var(--gold);
  border-radius: 2px;
  font-size: .86rem;
  line-height: 1.85;
  display: none;
  margin-bottom: .8rem;
}
.zh-box.show { display: block; }
.zh-headword {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  font-style: italic;
  color: var(--ink) !important;
  margin-bottom: .3rem;
}

/* ── ACTION ROW ── */
.act-row {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  margin-top: .5rem;
}
.act-btn {
  padding: .75rem 1.5rem;
  border-radius: 2px;
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: .07em;
  text-transform: uppercase;
  transition: all .12s;
  display: none;
  border: 2px solid;
}
.act-btn.show { display: inline-block; }
.act-next {
  background: var(--ink) !important;
  color: white !important;
  border-color: var(--ink);
}
.act-next:hover { background: var(--accent) !important; border-color: var(--accent); }
.act-zh {
  background: transparent !important;
  color: var(--gold) !important;
  border-color: var(--gold);
}
.act-zh:hover { background: var(--gold) !important; color: white !important; }

/* ── RESULT ── */
.result-card {
  background: var(--card) !important;
  color: var(--ink) !important;
  border: 1.5px solid var(--border);
  border-radius: 2px;
  padding: 3rem 2rem;
  box-shadow: var(--shadow);
  text-align: center;
  max-width: 520px;
  margin: 0 auto;
}
.r-fraction {
  font-family: 'Playfair Display', serif;
  font-size: 5rem;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -.04em;
}
.r-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin: .5rem 0 1rem;
}
.r-message {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-style: italic;
  margin-bottom: .4rem;
}
.r-sub { font-size: .88rem; color: var(--muted); margin-bottom: 1rem; }
.streak-badge {
  display: inline-block;
  background: #fef3c7 !important;
  color: #92400e !important;
  border: 1.5px solid #d97706;
  border-radius: 20px;
  padding: .3rem 1.1rem;
  font-family: 'DM Mono', monospace;
  font-size: .78rem;
  letter-spacing: .05em;
  margin-bottom: 1.5rem;
}
.r-status {
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  color: var(--muted);
  margin-bottom: 1.5rem;
  letter-spacing: .04em;
}

/* ── HISTORY ── */
.hist-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1.3rem;
}
.close-btn {
  background: none;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  color: var(--muted);
  line-height: 1;
  padding: .2rem;
  flex-shrink: 0;
}
.close-btn:hover { color: var(--ink); }
.badges {
  display: flex;
  gap: .6rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.badge {
  border-radius: 3px;
  padding: .3rem .8rem;
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  letter-spacing: .04em;
  border: 1px solid;
}
.badge-fire { background: #fef3c7 !important; color: #92400e !important; border-color: #d97706; }
.badge-green { background: var(--green-bg) !important; color: var(--green) !important; border-color: var(--green); }
.htable {
  width: 100%;
  border-collapse: collapse;
  font-size: .84rem;
  margin-top: .8rem;
}
.htable th {
  padding: .55rem .5rem;
  border-bottom: 2px solid var(--ink);
  text-align: left;
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}
.htable td {
  padding: .55rem .5rem;
  border-bottom: 1px solid var(--border);
  font-family: 'Source Serif 4', serif;
}

/* ── VOCAB CARD ── */
.vocab-item {
  border-radius: 2px;
  padding: .9rem 1rem;
  margin-bottom: .7rem;
  font-size: .86rem;
  line-height: 1.85;
  border-left: 3px solid;
}
.vocab-item.correct { background: var(--green-bg) !important; border-color: var(--green); }
.vocab-item.wrong { background: var(--red-bg) !important; border-color: #ef4444; }
.vocab-headword {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  font-style: italic;
  color: var(--ink) !important;
  margin-bottom: .2rem;
}
.vocab-section-label {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  font-weight: 600;
  margin: 1.2rem 0 .6rem;
}
.vocab-section-label.correct { color: var(--green); }
.vocab-section-label.wrong { color: #ef4444; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .masthead { font-size: 1.3rem; }
  .edition { display: none; }
  header .header-inner { padding: .8rem 1rem; }
  .page-wrap { padding: 1.2rem 1rem; }
  .center-wrap { padding: 0 1rem; margin: 1.5rem auto; }
  .card { padding: 1.5rem 1.2rem; }
  .opts { grid-template-columns: 1fr; }
  .news-card { padding: 1.2rem 1.2rem 1.2rem 1.5rem; }
  .news-title { font-size: 1.05rem; }
  .result-card { padding: 2rem 1.2rem; }
  .r-fraction { font-size: 3.8rem; }
  .act-row { flex-direction: column; }
  .act-btn { width: 100%; text-align: center; }
  .h-score-label { display: none; }
}

@media (max-width: 380px) {
  .masthead { font-size: 1.15rem; }
  .card-title { font-size: 1.4rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="masthead">The Daily<span>.</span>Quiz</div>
    <div class="edition">English Learning<br>International News</div>
    <div class="header-right">
      <span class="h-nick" id="hNick"></span>
      <span class="h-plays" id="hPlays"></span>
      <span class="h-score-label">Score</span>
      <span class="h-score" id="scoreDisplay">—</span>
    </div>
  </div>
</header>

<!-- ① Login -->
<div id="loginScreen" class="screen active">
  <div class="center-wrap">
    <div class="card">
      <div class="card-eyebrow">Daily Challenge</div>
      <div class="card-title">每日新聞測驗</div>
      <div class="card-sub">每天最多 10 次，從國際新聞學英文單字。輸入暱稱開始今天的挑戰！</div>
      <label for="nicknameInput">你的暱稱</label>
      <input type="text" id="nicknameInput" placeholder="e.g. Mz, Sara, Wendy..." maxlength="20" autocomplete="off">
      <div class="plays-msg" id="playsLeftMsg"></div>
      <button class="btn btn-primary" id="startBtn" onclick="startQuiz()">開始今天的測驗 →</button>
      <hr class="divider">
      <button class="btn btn-outline" onclick="showVocabReview()">📖 今日學習單字</button>
      <button class="btn btn-outline" onclick="showHistory()">📊 查看歷史成績</button>
      <div class="note">暱稱用來記錄分數，下次輸入相同暱稱可查看歷史</div>
    </div>
  </div>
</div>

<!-- ② Quiz -->
<div id="quizScreen" class="screen">
  <div class="page-wrap">
    <div id="quizLoading" class="loading-state" style="display:none">
      <div class="loading-dots">載入題目中</div>
    </div>
    <div id="quizContent" style="display:none">
      <div class="progress-wrap">
        <div class="progress-strip" id="progressStrip"></div>
        <div class="q-counter" id="counterText"></div>
      </div>
      <div class="news-card">
        <div class="src-tag"><span class="src-dot"></span><span id="srcTag"></span></div>
        <div class="news-title" id="newsTitle"></div>
        <div class="news-summary" id="newsSummary"></div>
      </div>
      <div class="q-section">
        <div class="q-eyebrow">Vocabulary Challenge</div>
        <div class="q-text" id="qText"></div>
        <div class="opts" id="optsGrid"></div>
        <div class="fb" id="fb"></div>
        <div class="zh-box" id="zhBox"></div>
        <div class="act-row">
          <button class="act-btn act-next" id="nextBtn" onclick="nextQ()">Next Question →</button>
          <button class="act-btn act-zh" id="zhBtn" onclick="showZh()">看中文解釋 🇹🇼</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ③ Result -->
<div id="resultScreen" class="screen">
  <div class="page-wrap">
    <div class="result-card">
      <div class="r-fraction" id="rGrade"></div>
      <div class="r-eyebrow">Today's Score</div>
      <div class="r-message" id="rMsg"></div>
      <div class="r-sub" id="rSub"></div>
      <div class="streak-badge" id="rStreak">🔥 連續 1 天</div><br>
      <div class="r-status" id="rStatus"></div>
      <button class="btn btn-primary" style="max-width:220px;margin:.5rem auto 0" onclick="goHome()">← 返回首頁</button>
    </div>
  </div>
</div>

<!-- ④ History -->
<div id="historyScreen" class="screen">
  <div class="center-wrap" style="max-width:580px">
    <div class="card">
      <div class="hist-header">
        <div>
          <div class="card-eyebrow">Records</div>
          <div class="card-title" style="font-size:1.35rem">歷史成績</div>
        </div>
        <button class="close-btn" onclick="closeHistory()">✕</button>
      </div>
      <label for="histNick">輸入暱稱查詢</label>
      <input type="text" id="histNick" placeholder="你的暱稱" onkeydown="if(event.key==='Enter')loadHistory()">
      <button class="btn btn-primary" onclick="loadHistory()">查詢 →</button>
      <div id="histContent"></div>
    </div>
  </div>
</div>

<!-- ⑤ Vocab Review -->
<div id="vocabScreen" class="screen">
  <div class="center-wrap" style="max-width:580px">
    <div class="card">
      <div class="hist-header">
        <div>
          <div class="card-eyebrow">Today's Words</div>
          <div class="card-title" style="font-size:1.35rem">今日學習單字</div>
        </div>
        <button class="close-btn" onclick="closeVocabReview()">✕</button>
      </div>
      <div id="vocabContent"></div>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxg6vUz-tj1BVJS3gwgjBxyHntODNmcg3BO4zZ1q59GT2jWI8k-5ioHamcdzRI1wE5P/exec';
const TOTAL = 5;
const MAX_PLAYS = 10;

// ── fallback static questions (used if API fails) ──
const FALLBACK_Q = [
  { src:"BBC News", title:"Iran's new supreme leader vows to block Strait of Hormuz",
    summary:"A message attributed to Mojtaba Khamenei says Iran will continue targeting American bases in the region.",
    word:"attributed", category:"politics",
    definition:"regarded as being caused by or belonging to a particular person",
    question:"The summary says a message was _____ to someone. What does this word mean?",
    option_a:"written and confirmed by", option_b:"believed or said to come from",
    option_c:"denied and rejected by", option_d:"translated and edited by",
    correct_ans:"B",
    zh_word:"歸因於、據稱出自（attributed to）",
    zh_definition:"指某件事被認為是由某人所說或所做，但不一定經過正式確認。",
    zh_context:"新聞說這則訊息「據稱出自」哈米尼，表示消息來源未經官方確認。",
    zh_example:"這份聲明被歸因於該國最高領導人，但尚未得到正式證實。"
  },
  { src:"The Verge", title:"Google's TV Streamer sets new benchmark for streaming devices",
    summary:"The device sets a new benchmark for streaming performance, making competing products look outdated.",
    word:"benchmark", category:"tech",
    definition:"a standard or point of reference against which things may be compared",
    question:"The review says the device 'sets a new _____'. What does this word mean?",
    option_a:"physical test in a laboratory", option_b:"standard used for comparison",
    option_c:"price reduction for consumers", option_d:"software update by the company",
    correct_ans:"B",
    zh_word:"基準、標竿（benchmark）",
    zh_definition:"用來與其他事物比較的標準或參考點，常用於評比產品或績效。",
    zh_context:"評測說這台裝置「樹立了新標竿」，意思是它成為同類產品必須追趕的新標準。",
    zh_example:"這款手機的電池續航力為業界樹立了新標竿。"
  },
  { src:"Al Jazeera", title:"Oil stays above $70 as markets weigh ceasefire prospects",
    summary:"Energy markets remain cautiously optimistic as analysts warn that volatility could return.",
    word:"volatility", category:"business",
    definition:"liability to change rapidly and unpredictably, especially for the worse",
    question:"Analysts warn that '_____ could return' to energy markets. What does this word mean?",
    option_a:"rapid and unpredictable change", option_b:"steady and consistent growth",
    option_c:"government regulation of prices", option_d:"environmental impact of energy",
    correct_ans:"A",
    zh_word:"波動性、不穩定性（volatility）",
    zh_definition:"形容某事物快速且難以預測地劇烈變化，常用於金融或能源市場。",
    zh_context:"分析師警告石油市場的「波動性可能回歸」，意指油價可能再次出現大幅漲跌。",
    zh_example:"受地緣政治緊張局勢影響，股市近期波動性大幅上升。"
  },
  { src:"BBC News", title:"China approves 'ethnic unity' law requiring minorities to learn Mandarin",
    summary:"The law states that children should be taught Mandarin before kindergarten and through high school.",
    word:"minorities", category:"politics",
    definition:"groups of people differing in race, religion, or culture from the majority of a population",
    question:"The article mentions language requirements for '_____'. What does this word mean?",
    option_a:"groups smaller than the majority population", option_b:"young children under school age",
    option_c:"government officials and teachers", option_d:"citizens living in rural areas",
    correct_ans:"A",
    zh_word:"少數群體（minorities）",
    zh_definition:"在人口中，與多數群體在種族、宗教或文化上有所不同的群體。",
    zh_context:"這項法律要求少數民族兒童在幼兒園前就需學習普通話，一直到高中。",
    zh_example:"許多國家的政府制定政策以保護語言少數群體的文化權利。"
  },
  { src:"NPR", title:"Scientists warn of accelerating glacial retreat worldwide",
    summary:"Researchers say glaciers are retreating at unprecedented rates, with profound implications for global water supplies.",
    word:"unprecedented", category:"news",
    definition:"never done or known before; without previous example",
    question:"Glaciers are retreating at '_____ rates'. What does this word mean?",
    option_a:"never seen before", option_b:"extremely slow and gradual",
    option_c:"well-documented historically", option_d:"carefully measured and predicted",
    correct_ans:"A",
    zh_word:"史無前例的（unprecedented）",
    zh_definition:"從未發生過或見過的；沒有先例的。",
    zh_context:"研究人員說冰川正以「史無前例的」速度退縮，意指這種速度在歷史上從未被記錄過。",
    zh_example:"這場颶風造成了史無前例的破壞，整個城市幾乎夷為平地。"
  }
];

// ── state ──
let cur = 0, score = 0, didAnswer = false, lockedIdx = 0;
let nick = '', uid = '', wordLog = [], sessionPool = [];

// ── helpers ──
const getToday = () => new Date().toISOString().split('T')[0];
const getSavedNick = () => localStorage.getItem('quiz_nick') || '';
const setSavedNick = n => localStorage.setItem('quiz_nick', n);
const getPlaysToday = u => parseInt(localStorage.getItem('quiz_plays_' + u + '_' + getToday()) || '0', 10);
const incPlays = u => localStorage.setItem('quiz_plays_' + u + '_' + getToday(), getPlaysToday(u) + 1);

function getMasteredToday(u) {
  try { return JSON.parse(localStorage.getItem('quiz_mastered_' + u + '_' + getToday()) || '[]'); }
  catch(e) { return []; }
}
function addMastered(u, words) {
  const m = getMasteredToday(u);
  words.forEach(w => { if (!m.includes(w)) m.push(w); });
  localStorage.setItem('quiz_mastered_' + u + '_' + getToday(), JSON.stringify(m));
}
function getTodayVocabLog(u) {
  try { return JSON.parse(localStorage.getItem('quiz_vocablog_' + u + '_' + getToday()) || '[]'); }
  catch(e) { return []; }
}
function appendTodayVocabLog(u, words) {
  const log = getTodayVocabLog(u);
  words.forEach(item => {
    const ex = log.find(x => x.word === item.word);
    if (ex) { if (item.correct) ex.correct = true; }
    else log.push({ ...item });
  });
  localStorage.setItem('quiz_vocablog_' + u + '_' + getToday(), JSON.stringify(log));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── JSONP ──
function apiJsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Date.now() + Math.random().toString(36).slice(2);
    const url = API + '?' + new URLSearchParams({ ...params, callback: cb });
    const s = document.createElement('script');
    const t = setTimeout(() => { cleanup(); reject(new Error('請求逾時')); }, 12000);
    window[cb] = d => { cleanup(); resolve(d); };
    function cleanup() { clearTimeout(t); delete window[cb]; s.parentNode && s.parentNode.removeChild(s); }
    s.onerror = () => { cleanup(); reject(new Error('網路錯誤')); };
    s.src = url;
    document.head.appendChild(s);
  });
}

// ── screen ──
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── init ──
window.addEventListener('DOMContentLoaded', () => {
  const saved = getSavedNick();
  if (saved) {
    document.getElementById('nicknameInput').value = saved;
    refreshLoginState(saved);
    updateHeader(saved);
  }
  const ni = document.getElementById('nicknameInput');
  ni.addEventListener('input', e => {
    const v = e.target.value.trim();
    refreshLoginState(v);
    if (v) updateHeader(v);
  });
  ni.addEventListener('keydown', e => { if (e.key === 'Enter') startQuiz(); });
});

function refreshLoginState(v) {
  const msg = document.getElementById('playsLeftMsg');
  const btn = document.getElementById('startBtn');
  if (!v) { msg.style.display = 'none'; btn.disabled = false; return; }
  const u = v.toLowerCase().replace(/\s+/g, '_');
  const plays = getPlaysToday(u), left = MAX_PLAYS - plays;
  msg.style.display = 'block';
  if (left <= 0) {
    msg.textContent = '⛔ 今天已達上限（10/10），明天再來！';
    msg.className = 'plays-msg warn';
    btn.disabled = true;
  } else {
    msg.textContent = '今天已玩 ' + plays + ' 次，剩餘 ' + left + ' 次';
    msg.className = 'plays-msg';
    btn.disabled = false;
  }
}

function updateHeader(v) {
  if (!v) return;
  const u = v.toLowerCase().replace(/\s+/g, '_');
  const left = MAX_PLAYS - getPlaysToday(u);
  const hn = document.getElementById('hNick');
  const hp = document.getElementById('hPlays');
  hn.textContent = v; hn.style.display = 'inline';
  hp.textContent = '剩 ' + left + ' 次';
  hp.style.display = 'inline';
  hp.style.color = left <= 2 ? 'var(--accent)' : 'var(--muted)';
}

// ── normalize question from API or fallback ──
function normalizeQ(raw) {
  return {
    src: raw.source || raw.src || 'News',
    title: raw.title || '',
    summary: raw.summary || '',
    word: raw.word || '',
    cat: raw.category || raw.cat || 'news',
    def: raw.definition || raw.def || '',
    q: raw.question || raw.q || '',
    opts: [raw.option_a, raw.option_b, raw.option_c, raw.option_d],
    ans: ['A','B','C','D'].indexOf((raw.correct_ans || 'A').toUpperCase()),
    zh: {
      w: raw.zh_word || raw.zh?.w || '',
      d: raw.zh_definition || raw.zh?.d || '',
      c: raw.zh_context || raw.zh?.c || '',
      e: raw.zh_example || raw.zh?.e || ''
    }
  };
}

// ── start quiz ──
async function startQuiz() {
  const v = document.getElementById('nicknameInput').value.trim();
  if (!v) { alert('請輸入暱稱！'); return; }
  const u = v.toLowerCase().replace(/\s+/g, '_');
  if (getPlaysToday(u) >= MAX_PLAYS) { alert('今天已達上限 10 次，明天再來！'); return; }
  nick = v; uid = u;
  setSavedNick(v);
  incPlays(uid);
  document.getElementById('scoreDisplay').textContent = '0';
  updateHeader(v);
  wordLog = []; cur = 0; score = 0; didAnswer = false;

  // show quiz screen with loading
  show('quizScreen');
  document.getElementById('quizLoading').style.display = 'block';
  document.getElementById('quizContent').style.display = 'none';

  // fetch questions from API
  try {
    const mastered = getMasteredToday(uid);
    const res = await apiJsonp({
      action: 'getQuestions',
      user_id: uid,
      limit: TOTAL + 5
    });

    let pool = [];
    if (res.success && res.data && res.data.length >= TOTAL) {
      pool = shuffle(res.data).slice(0, TOTAL).map(normalizeQ);
    } else {
      throw new Error('題目不足');
    }
    sessionPool = pool;
  } catch(e) {
    // fallback to static questions
    const mastered = getMasteredToday(uid);
    let pool = FALLBACK_Q.filter(q => !mastered.includes(q.word));
    if (pool.length < TOTAL) {
      pool = [...pool, ...FALLBACK_Q.filter(q => mastered.includes(q.word))];
    }
    sessionPool = shuffle(pool).slice(0, TOTAL).map(normalizeQ);
  }

  document.getElementById('quizLoading').style.display = 'none';
  document.getElementById('quizContent').style.display = 'block';
  buildProgress();
  loadQ();
}

function buildProgress() {
  const s = document.getElementById('progressStrip');
  s.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'pdot' + (i === cur ? ' cur' : i < cur ? ' done' : '');
    d.id = 'pd' + i;
    s.appendChild(d);
  }
}

const LETTERS = ['A', 'B', 'C', 'D'];

function loadQ() {
  const q = sessionPool[cur];
  didAnswer = false;
  document.getElementById('counterText').textContent = 'Question ' + (cur + 1) + ' of ' + TOTAL;
  document.getElementById('srcTag').textContent = q.src;
  document.getElementById('newsTitle').textContent = q.title;
  document.getElementById('newsSummary').innerHTML = q.summary.replace(
    new RegExp('\\b' + q.word + '\\b', 'gi'),
    '<span class="hl" title="' + q.def + '">$&</span>'
  );
  document.getElementById('qText').textContent = q.q;

  const grid = document.getElementById('optsGrid');
  grid.innerHTML = '';
  const idxs = shuffle([0, 1, 2, 3]);
  const newAns = idxs.indexOf(q.ans);
  q._sa = newAns;
  idxs.map(i => q.opts[i]).forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = '<span class="opt-letter">' + LETTERS[i] + '</span>' + (o || '');
    b.onclick = () => checkAns(i);
    grid.appendChild(b);
  });

  document.getElementById('fb').className = 'fb';
  document.getElementById('fb').innerHTML = '';
  document.getElementById('zhBox').className = 'zh-box';
  document.getElementById('zhBox').innerHTML = '';
  document.getElementById('nextBtn').className = 'act-btn act-next';
  document.getElementById('zhBtn').className = 'act-btn act-zh';
}

function checkAns(chosen) {
  if (didAnswer) return;
  didAnswer = true;
  lockedIdx = cur;
  const q = sessionPool[cur];
  const btns = document.querySelectorAll('.opt');
  const ok = chosen === q._sa;
  btns.forEach(b => b.disabled = true);
  btns[q._sa].classList.add('correct');
  if (!ok) btns[chosen].classList.add('wrong');
  if (ok) {
    score++;
    document.getElementById('scoreDisplay').textContent = score;
  }
  const fb = document.getElementById('fb');
  fb.className = 'fb ' + (ok ? 'show-correct' : 'show-wrong');
  fb.innerHTML = (ok ? '✓ Correct! ' : '✗ Not quite. ') +
    '<span class="fb-word">' + q.word + '</span> — ' + q.def;

  wordLog.push({
    word: q.word,
    word_zh: q.zh.w,
    category: q.cat,
    correct: ok,
    zh: q.zh
  });

  document.getElementById('nextBtn').className = 'act-btn act-next show';
  document.getElementById('zhBtn').className = 'act-btn act-zh show';
  document.getElementById('pd' + cur).className = 'pdot done';
}

function showZh() {
  const zh = sessionPool[lockedIdx].zh;
  const box = document.getElementById('zhBox');
  box.className = 'zh-box show';
  box.innerHTML =
    '<div class="zh-headword">📖 ' + zh.w + '</div>' +
    '<div><b>定義：</b>' + zh.d + '</div>' +
    '<div style="margin-top:.3rem"><b>文章語境：</b>' + zh.c + '</div>' +
    '<div style="margin-top:.3rem"><b>例句：</b><em>' + zh.e + '</em></div>';
  document.getElementById('zhBtn').className = 'act-btn act-zh';
}

function nextQ() {
  cur++;
  if (cur >= TOTAL) showResult();
  else {
    document.getElementById('pd' + cur).className = 'pdot cur';
    loadQ();
    window.scrollTo(0, 0);
  }
}

async function showResult() {
  const correctWords = wordLog.filter(x => x.correct).map(x => x.word);
  addMastered(uid, correctWords);
  appendTodayVocabLog(uid, wordLog);
  show('resultScreen');

  const pct = Math.round(score / TOTAL * 100);
  document.getElementById('rGrade').textContent = score + '/' + TOTAL;
  const msgs = ['繼續加油！', '繼續努力！', '還不錯喔！', '表現良好！', '非常優秀！', '完美表現！'];
  document.getElementById('rMsg').textContent = msgs[score] || 'Great Job!';
  document.getElementById('rSub').textContent = '正確率 ' + pct + '%';
  document.getElementById('rStatus').textContent = '儲存中...';

  try {
    const r = await apiJsonp({
      action: 'saveScore',
      user_id: uid,
      nickname: nick,
      correct: score,
      wrong: TOTAL - score,
      total_questions: TOTAL
    });
    document.getElementById('rStreak').textContent = '🔥 連續 ' + (r.streak || 1) + ' 天';
    apiJsonp({
      action: 'saveVocab',
      user_id: uid,
      words: JSON.stringify(wordLog.map(x => ({
        word: x.word,
        word_zh: x.word_zh,
        category: x.category,
        correct: x.correct
      })))
    }).catch(() => {});
    document.getElementById('rStatus').textContent = '✓ 分數已儲存';
  } catch(e) {
    document.getElementById('rStatus').textContent = '（離線模式，分數未儲存）';
  }
}

function goHome() {
  document.getElementById('scoreDisplay').textContent = '—';
  updateHeader(nick);
  refreshLoginState(nick);
  show('loginScreen');
}

// ── vocab review ──
function showVocabReview() {
  const v = document.getElementById('nicknameInput').value.trim();
  const u = v ? v.toLowerCase().replace(/\s+/g, '_') : (uid || '');
  const log = u ? getTodayVocabLog(u) : [];
  const box = document.getElementById('vocabContent');

  if (!log.length) {
    box.innerHTML = '<p style="color:var(--muted);font-size:.9rem;margin-top:.8rem;font-family:\'Source Serif 4\',serif">今天還沒有學習紀錄，先去玩一輪吧！</p>';
  } else {
    const correct = log.filter(x => x.correct);
    const wrong = log.filter(x => !x.correct);
    let h = '';
    if (correct.length) {
      h += '<div class="vocab-section-label correct">✓ 已掌握（' + correct.length + ' 個）</div>';
      correct.forEach(item => { h += vocabCard(item, true); });
    }
    if (wrong.length) {
      h += '<div class="vocab-section-label wrong">✗ 還需練習（' + wrong.length + ' 個）</div>';
      wrong.forEach(item => { h += vocabCard(item, false); });
    }
    box.innerHTML = h;
  }
  show('vocabScreen');
}

function vocabCard(item, ok) {
  const zh = item.zh || {};
  return '<div class="vocab-item ' + (ok ? 'correct' : 'wrong') + '">' +
    '<div class="vocab-headword">' + item.word + '</div>' +
    '<div><b>中文：</b>' + (zh.w || item.word_zh || '—') + '</div>' +
    '<div><b>定義：</b>' + (zh.d || '—') + '</div>' +
    '<div><b>例句：</b><em>' + (zh.e || '—') + '</em></div>' +
    '</div>';
}

function closeVocabReview() { show('loginScreen'); }

// ── history ──
function showHistory() {
  const v = document.getElementById('nicknameInput').value.trim();
  if (v) document.getElementById('histNick').value = v;
  document.getElementById('histContent').innerHTML = '';
  show('historyScreen');
  if (v) loadHistory();
}

function closeHistory() { show('loginScreen'); }

async function loadHistory() {
  const v = document.getElementById('histNick').value.trim();
  if (!v) { alert('請輸入暱稱'); return; }
  const huid = v.toLowerCase().replace(/\s+/g, '_');
  const box = document.getElementById('histContent');
  box.innerHTML = '<p style="color:var(--muted);font-size:.85rem;margin-top:.8rem;font-family:\'DM Mono\',monospace">載入中...</p>';
  try {
    const data = await apiJsonp({ action: 'getScores', user_id: huid });
    if (!data.success || !data.data || !data.data.length) {
      box.innerHTML = '<p style="color:var(--muted);font-size:.88rem;margin-top:.8rem">查無紀錄，還沒玩過或暱稱不同！</p>';
      return;
    }
    const rows = data.data.slice().reverse();
    const streak = data.streak || 0;
    let h = '<div class="badges">' +
      '<span class="badge badge-fire">🔥 連續 ' + streak + ' 天</span>' +
      '<span class="badge badge-green">📅 共 ' + rows.length + ' 筆</span>' +
      '</div>' +
      '<table class="htable"><thead><tr>' +
      '<th>日期</th><th>正確</th><th>錯誤</th><th>正確率</th>' +
      '</tr></thead><tbody>';
    rows.forEach(r => {
      h += '<tr>' +
        '<td>' + (r.date || '-') + '</td>' +
        '<td style="color:var(--green);font-weight:600">' + (r.correct || 0) + '</td>' +
        '<td style="color:#ef4444">' + (r.wrong || 0) + '</td>' +
        '<td>' + (r.accuracy || '-') + '</td>' +
        '</tr>';
    });
    h += '</tbody></table>';
    box.innerHTML = h;
  } catch(e) {
    box.innerHTML = '<p style="color:var(--accent);font-size:.88rem;margin-top:.8rem">載入失敗：' + e.message + '</p>';
  }
}
</script>
</body>
</html>
